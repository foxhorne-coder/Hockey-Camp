<!DOCTYPE html>
<html>
<body style="font-family:Arial;padding:40px;text-align:center;">

<h2>Add Camp</h2>

<input id="title"><br><br>
<input id="description"><br><br>
<input id="startDate" type="date"><br><br>

<button onclick="add()">Add Camp</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

function add(){
db.collection("camps").add({
title:title.value,
description:description.value,
startDate:startDate.value
});
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Add Camp Date</h2>

<input id="title" placeholder="Camp Name"><br><br>
<input id="date" type="date"><br><br>
<input id="price" placeholder="Price"><br><br>

<button onclick="addCamp()">Add Camp</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔒 PROTECT PAGE
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location = "admin.html";
  }
});

function addCamp(){
  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const price = document.getElementById("price").value;

  db.collection("camps").add({
    title: title,
    date: date,
    price: price
  })
  .then(() => alert("Camp added!"))
  .catch(err => alert(err));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard - Add Camp</h2>

<input id="title" placeholder="Camp Name"><br><br>

<label>Start Date:</label><br>
<input id="startDate" type="date"><br><br>

<label>End Date:</label><br>
<input id="endDate" type="date"><br><br>

<label>Start Time:</label><br>
<input id="startTime" type="time"><br><br>

<label>End Time:</label><br>
<input id="endTime" type="time"><br><br>

<input id="price" placeholder="Price"><br><br>

<button onclick="addCamp()">Add Camp</button>

<hr>

<h2>Existing Camps</h2>
<div id="camp-list"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔒 Protect page
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location = "admin.html";
  }
});

// ➕ Add camp
function addCamp(){
  const title = document.getElementById("title").value;
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;
  const startTime = document.getElementById("startTime").value;
  const endTime = document.getElementById("endTime").value;
  const price = document.getElementById("price").value;

  db.collection("camps").add({
    title,
    startDate,
    endDate,
    startTime,
    endTime,
    price
  })
  .then(() => {
    alert("Camp added!");

    // Clear form
    document.getElementById("title").value = "";
    document.getElementById("startDate").value = "";
    document.getElementById("endDate").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endTime").value = "";
    document.getElementById("price").value = "";
  })
  .catch(err => alert(err));
}

// 📋 SHOW CAMPS + DELETE BUTTON
const campList = document.getElementById("camp-list");

db.collection("camps").onSnapshot(snapshot => {
  campList.innerHTML = "";

  snapshot.forEach(doc => {
    const camp = doc.data();

    campList.innerHTML += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <h3>${camp.title}</h3>
        <p>${camp.startDate} → ${camp.endDate}</p>
        <p>${camp.startTime} → ${camp.endTime}</p>
        <p>£${camp.price}</p>

        <button onclick="deleteCamp('${doc.id}')">Delete</button>
      </div>
    `;
  });
});

// ❌ DELETE FUNCTION
function deleteCamp(id){
  if(confirm("Are you sure you want to delete this camp?")){
    db.collection("camps").doc(id).delete()
      .then(() => alert("Deleted"))
      .catch(err => alert(err));
  }
}
</script>

</body>
</html>

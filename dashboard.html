<!DOCTYPE html>
<html>
<body style="font-family:Arial;padding:40px;text-align:center;">

<h2>Add Camp</h2>

<input id="title" placeholder="Camp name"><br><br>
<input id="description" placeholder="Description"><br><br>
<input id="startDate" type="date"><br><br>
<input id="maxPlayers" placeholder="Max players"><br><br>

<button onclick="add()">Add Camp</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

function add(){
firebase.firestore().collection("camps").add({
title:title.value,
description:description.value,
startDate:startDate.value,
maxPlayers:maxPlayers.value
});
alert("Camp added");
}
</script>

</body>
</html>

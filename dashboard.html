<!DOCTYPE html>
<html>
<body style="font-family:Arial;background:#020617;color:white;text-align:center;padding:40px;">

<h2>Add Camp</h2>

<input id="title"><br>
<input id="description"><br>
<input id="startDate" type="date"><br>

<button onclick="add()">Add</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

function add(){
firebase.firestore().collection("camps").add({
title:title.value,
description:description.value,
startDate:startDate.value
});
}
</script>

</body>
</html>

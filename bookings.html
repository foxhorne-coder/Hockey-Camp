<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Bookings</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
.container{padding:20px;}
.card{background:rgba(255,255,255,0.05);padding:15px;margin:10px;border-radius:10px;}
button{background:#ff4d4d;border:none;padding:8px;border-radius:6px;}
</style>
</head>

<body>

<div class="container">
<h2>Bookings</h2>

<input id="search" placeholder="Search..." oninput="load()">

<div id="count"></div>
<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

function load(){
let search=document.getElementById("search").value.toLowerCase();

db.collection("bookings").get().then(snap=>{
let html="",total=0;

snap.forEach(doc=>{
let b=doc.data();
if(!b.name.toLowerCase().includes(search)) return;

total++;

html+=`
<div class="card">
<b>${b.name}</b><br>
${b.team}<br>
${b.status}<br>
<button onclick="del('${doc.id}')">Delete</button>
</div>`;
});

count.innerHTML="Total: "+total;
list.innerHTML=html;
});
}

function del(id){
db.collection("bookings").doc(id).delete();
load();
}

load();
</script>

</body>
</html>

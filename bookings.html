<!DOCTYPE html>
<html>
<head>
  <title>Bookings</title>
</head>
<body>

<h2>All Bookings</h2>

<div id="booking-list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const bookingList = document.getElementById("booking-list");

// LOAD BOOKINGS
db.collection("bookings").onSnapshot(snapshot => {
  bookingList.innerHTML = "";

  snapshot.forEach(doc => {
    const b = doc.data();

    bookingList.innerHTML += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <h3>${b.name}</h3>

        <p><strong>Camp:</strong> ${b.campName}</p>
        <p><strong>Age:</strong> ${b.age}</p>
        <p><strong>Number:</strong> ${b.playerNumber}</p>
        <p><strong>Team:</strong> ${b.team}</p>
        <p><strong>Email:</strong> ${b.email}</p>
        <p><strong>Status:</strong> ${b.status}</p>

        <button onclick="markPaid('${doc.id}')">Mark Paid</button>
        <button onclick="deleteBooking('${doc.id}')">Delete</button>
      </div>
    `;
  });
});

// MARK AS PAID
function markPaid(id){
  db.collection("bookings").doc(id).update({
    status: "paid"
  });
}

// DELETE
function deleteBooking(id){
  if(confirm("Delete this booking?")){
    db.collection("bookings").doc(id).delete();
  }
}
</script>

</body>
</html>

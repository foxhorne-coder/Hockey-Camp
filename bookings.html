<!DOCTYPE html>
<html>
<body style="font-family:Arial;background:#f5f7fa;padding:20px;">

<h2>Bookings</h2>

<input id="search" placeholder="Search player..." oninput="load()"><br><br>

<div id="count"></div>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

function load(){
const search=document.getElementById("search").value.toLowerCase();

db.collection("bookings").get().then(snap=>{
let html="", total=0;

snap.forEach(doc=>{
const b=doc.data();

if(!b.name.toLowerCase().includes(search)) return;

total++;

html+=`
<div style="background:white;padding:15px;margin:10px;border-radius:10px;">
<b>${b.name}</b> (${b.team})<br>
Status: ${b.status}<br>

<button onclick="del('${doc.id}')">Delete</button>
</div>
`;
});

document.getElementById("count").innerHTML="Total bookings: "+total;
document.getElementById("list").innerHTML=html;
});
}

function del(id){
if(confirm("Delete booking?")){
db.collection("bookings").doc(id).delete();
load();
}
}

load();
</script>

</body>
</html>

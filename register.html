<!DOCTYPE html>
<html>
<body style="font-family:Arial;padding:20px;">

<h2>Ratings</h2>

<div id="avg"></div>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

firebase.firestore().collection("ratings").get().then(snap=>{
let total=0,count=0,html="";

snap.forEach(doc=>{
const r=doc.data();
total+=r.stars;
count++;

html+=`
<div>
<b>${r.name}</b><br>
${"★".repeat(r.stars)}<br>
${r.review}
<hr>
</div>
`;
});

document.getElementById("avg").innerHTML="Average: "+(total/count).toFixed(1);
document.getElementById("list").innerHTML=html;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body style="font-family:Arial;text-align:center;padding:40px;">

<h2>Book Camp</h2>

<input id="name" placeholder="Name"><br><br>
<input id="team" placeholder="Team"><br><br>

<button onclick="book()">Book</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
authDomain:"hockey-camp-68285.firebaseapp.com",
projectId:"hockey-camp-68285"
});

const db=firebase.firestore();
const campId=new URLSearchParams(location.search).get("id");

async function book(){
const ref=await db.collection("bookings").add({
name:name.value,
team:team.value,
campId,
status:"pending"
});

confetti();

setTimeout(()=>{
window.location="https://buy.stripe.com/eVq8wQe7g84MdSW6288N200?bookingId="+ref.id;
},1000);
}
</script>

</body>
</html>

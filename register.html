<!DOCTYPE html>
<html>
<head>
  <title>Book Camp</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
    }

    input {
      padding: 12px;
      margin: 10px;
      width: 250px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #e63946;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 260px;
    }
  </style>
</head>

<body>

<h2>Book Your Camp Spot</h2>

<div class="box">
  <input id="name" placeholder="Player Name"><br>
  <input id="age" placeholder="Age"><br>
  <input id="number" placeholder="Player Number"><br>
  <input id="team" placeholder="Current Team"><br>
  <input id="email" placeholder="Parent Email"><br>

  <button onclick="book()">Confirm & Pay</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const campId = params.get("id");

async function book(){
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const number = document.getElementById("number").value;
  const team = document.getElementById("team").value;
  const email = document.getElementById("email").value;

  const campDoc = await db.collection("camps").doc(campId).get();
  const camp = campDoc.data();

  const bookingRef = await db.collection("bookings").add({
    name, age, playerNumber: number, team, email,
    campId,
    campName: camp.title,
    status: "pending"
  });

  window.location = "https://buy.stripe.com/eVq8wQe7g84MdSW6288N200?bookingId=" + bookingRef.id;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body style="font-family:Arial;text-align:center;padding:40px;">

<h2>Book Camp</h2>

<input id="name" placeholder="Name"><br><br>
<input id="team" placeholder="Team"><br><br>

<button id="btn" onclick="book()">Book</button>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

const campId=new URLSearchParams(location.search).get("id");

async function book(){

const name=nameInput.value;
const team=teamInput.value;

if(!name || !team){
alert("Fill all fields");
return;
}

btn.disabled=true;
status.innerHTML="Booking...";

const ref=await db.collection("bookings").add({
name,
team,
campId,
status:"pending"
});

confetti();

status.innerHTML="Redirecting to payment...";

setTimeout(()=>{
window.location="https://buy.stripe.com/eVq8wQe7g84MdSW6288N200?bookingId="+ref.id;
},1200);
}
</script>

</body>
</html>

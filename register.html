<!DOCTYPE html>
<html>
<head>
  <title>Book Camp</title>
</head>
<body>

<h2>Book Camp</h2>

<input id="name" placeholder="Player Name"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="number" placeholder="Player Number"><br><br>
<input id="team" placeholder="Current Team"><br><br>
<input id="email" placeholder="Parent Email"><br><br>

<button onclick="book()">Confirm Booking & Pay</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Get camp ID from URL
const params = new URLSearchParams(window.location.search);
const campId = params.get("id");

async function book(){
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const number = document.getElementById("number").value;
  const team = document.getElementById("team").value;
  const email = document.getElementById("email").value;

  // Get camp info
  const campDoc = await db.collection("camps").doc(campId).get();
  const camp = campDoc.data();

  // Save booking as pending
  await db.collection("bookings").add({
    name: name,
    age: age,
    playerNumber: number,
    team: team,
    email: email,
    campId: campId,
    campName: camp.title,
    status: "pending"
  });

  alert("Redirecting to secure payment...");

  // 🔥 YOUR STRIPE PAYMENT LINK
  window.location = "https://buy.stripe.com/eVq8wQe7g84MdSW6288N200";
}
</script>

</body>
</html>

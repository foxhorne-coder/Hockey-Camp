<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>

<h2>Book Camp</h2>

<input id="name" placeholder="Player Name"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="email" placeholder="Parent Email"><br><br>

<button onclick="book()">Confirm Booking</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const campId = params.get("id");

function book(){
  db.collection("bookings").add({
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    email: document.getElementById("email").value,
    campId: campId
  })
  .then(() => {
    alert("Booking confirmed!");
    window.location = "index.html";
  })
  .catch(err => alert(err));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Ratings</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(120deg,#0a0f2c,#1a0033);
color:white;
padding:80px 20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:10px 0;
border-radius:10px;
}

.stars{color:gold;}
</style>
</head>

<body>

<h2>Player Reviews</h2>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

firebase.firestore().collection("ratings").get().then(snap=>{
let html="";
snap.forEach(doc=>{
let r=doc.data();
html+=`
<div class="card">
<b>${r.name}</b><br>
<span class="stars">${"★".repeat(r.stars)}</span><br>
${r.review}
</div>`;
});
list.innerHTML=html;
});
</script>

</body>
</html>

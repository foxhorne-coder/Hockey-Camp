<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Ratings</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
color:white;
background:linear-gradient(120deg,#0a0f2c,#1a0033);
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:15px 0;
border-radius:12px;
opacity:0;
transform:translateY(20px);
transition:0.5s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.stars{color:gold;}
</style>
</head>

<body>

<h2>Player Reviews</h2>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSy...",
projectId:"hockey-camp-68285"
});

firebase.firestore().collection("ratings").get().then(snap=>{
let html="";

snap.forEach(doc=>{
let r=doc.data();

html+=`
<div class="card">
<b>${r.name}</b><br>
<span class="stars">${"★".repeat(r.stars)}</span><br>
${r.review}
</div>`;
});

list.innerHTML=html;

document.querySelectorAll(".card").forEach((el,i)=>{
setTimeout(()=>el.classList.add("show"),i*100);
});
});
</script>

</body>
</html>

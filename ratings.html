<!DOCTYPE html>
<html>
<body style="font-family:Arial;background:#020617;color:white;padding:20px;">

<h2>Ratings</h2>

<div id="avg"></div>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

firebase.firestore().collection("ratings").get().then(snap=>{
let total=0,count=0,html="";

snap.forEach(doc=>{
let r=doc.data();
total+=r.stars;
count++;

html+=`<div>${r.name} ${"★".repeat(r.stars)}<br>${r.review}</div><hr>`;
});

avg.innerHTML="Average: "+(total/count).toFixed(1);
list.innerHTML=html;
});
</script>

</body>
</html>

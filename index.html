<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Project UK</title>

<style>
body{
margin:0;
font-family:'Segoe UI', Arial;
background:linear-gradient(135deg,#020617,#0a2540);
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:rgba(10,37,64,0.8);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{color:#00e5ff;}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:40px;
text-shadow:0 0 15px #00e5ff;
}

/* BUTTON */
button{
background:linear-gradient(135deg,#00e5ff,#007bff);
padding:15px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
box-shadow:0 0 15px #00e5ff;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px #00e5ff;
}

/* SECTION */
.section{
padding:50px 20px;
text-align:center;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:600px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,229,255,0.2);
transition:0.3s;
opacity:0;
transform:translateY(20px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 30px #00e5ff;
}

.stars{color:gold;}
</style>
</head>

<body>

<nav>
<div>🏒 Hockey Project</div>
<div>
<a href="index.html">Home</a>
<a href="camps.html">Camps</a>
<a href="location.html">Locations</a>
<a href="ratings.html">Ratings</a>
<a href="coach.html">Coach</a>
</div>
</nav>

<div class="hero">
<h1>Hockey Project UK</h1>
<p>Elite Training Camps</p>

<a href="camps.html">
<button>🔥 Secure Your Spot</button>
</a>
</div>

<div class="section">
<h2>What You Get</h2>

<div class="card fade">
✔ Elite Coaching<br>
✔ Match Simulation<br>
✔ Skill Development<br>
✔ High Intensity Training
</div>
</div>

<div class="section">
<h2>⭐ Player Reviews</h2>

<div id="ratings"></div>

<a href="ratings.html">
<button>View All Reviews</button>
</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
projectId:"hockey-camp-68285"
});

firebase.firestore().collection("ratings").limit(3).get().then(snap=>{
let html="";

snap.forEach(doc=>{
const r=doc.data();

html+=`
<div class="card fade">
<b>${r.name}</b><br>
<span class="stars">${"★".repeat(r.stars)}</span><br>
${r.review}
</div>
`;
});

document.getElementById("ratings").innerHTML=html;

document.querySelectorAll(".card").forEach(el=>{
setTimeout(()=>el.classList.add("show"),100);
});
});
</script>

</body>
</html>

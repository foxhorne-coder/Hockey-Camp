<!DOCTYPE html>
<html>
<head>
  <title>Hockey Project UK</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    nav {
      background:#0a2540;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav a {
      color:white;
      margin:10px;
      text-decoration:none;
      transition:0.3s;
    }

    nav a:hover {
      color:#e63946;
    }

    .hero {
      background:url('photo1.jpg') center/cover;
      padding:120px 20px;
      text-align:center;
      color:white;
      position:relative;
    }

    .hero::before {
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,0.5);
    }

    .hero * {
      position:relative;
    }

    button {
      background:#e63946;
      color:white;
      padding:15px 25px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.08);
      background:#c92d3a;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:15px;
      padding:40px;
    }

    .grid img {
      width:100%;
      border-radius:10px;
      transition: transform 0.4s ease;
    }

    .grid img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<nav>
  <img src="logo.png" style="height:40px;">
  <div>
    <a href="index.html">Home</a>
    <a href="camps.html">Camps</a>
    <a href="location.html">How to Get There</a>
    <a href="ratings.html">Ratings</a>
  </div>
</nav>

<div class="hero">
  <h1>Hockey Project UK</h1>
  <p>Elite Training Camps</p>

  <a href="camps.html">
    <button>View Camps</button>
  </a>
</div>

<div class="grid">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

</body>
</html>

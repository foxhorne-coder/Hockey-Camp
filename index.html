<!DOCTYPE html>
<html>
<head>
  <title>Hockey Project UK</title>

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f5f7fa;
    }

    /* LOADER */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0a2540;
      color: white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      z-index:9999;
      animation: fadeOut 1s ease 1.5s forwards;
    }

    @keyframes fadeOut {
      to {opacity:0; visibility:hidden;}
    }

    /* NAV */
    nav {
      background:#0a2540;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    nav a {
      color:white;
      margin:10px;
      text-decoration:none;
      transition:0.3s;
    }

    nav a:hover {
      color:#e63946;
    }

    /* HERO */
    .hero {
      background:url('photo1.jpg') center/cover;
      padding:120px 20px;
      text-align:center;
      color:white;
      position:relative;
    }

    .hero::before {
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,0.5);
    }

    .hero * {
      position:relative;
    }

    button {
      background:#e63946;
      color:white;
      padding:15px;
      border:none;
      border-radius:8px;
      transition:0.3s;
    }

    button:hover {
      transform:scale(1.1);
    }

    /* SCROLL ANIMATION */
    .fade-in {
      opacity:0;
      transform:translateY(30px);
      transition:0.6s;
    }

    .fade-in.show {
      opacity:1;
      transform:translateY(0);
    }

    /* PAGE SLIDE */
    .page {
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {transform:translateX(50px); opacity:0;}
      to {transform:translateX(0); opacity:1;}
    }
  </style>
</head>

<body>

<div id="loader">Hockey Project UK</div>

<div class="page">

<nav>
  <img src="logo.png" style="height:40px;">
  <div>
    <a href="index.html">Home</a>
    <a href="camps.html">Camps</a>
    <a href="location.html">How to Get There</a>
    <a href="ratings.html">Ratings</a>
  </div>
</nav>

<div class="hero fade-in">
  <h1>Hockey Project UK</h1>
  <p>Elite Training Camps</p>
</div>

<div class="fade-in" style="padding:40px; text-align:center;">
  <h2>Train Like a Pro</h2>
</div>

</div>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".fade-in").forEach(el => {
  observer.observe(el);
});
</script>

</body>
</html>

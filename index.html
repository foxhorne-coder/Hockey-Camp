<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Project UK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

/* NAVBAR */
nav{
background:#0a2540;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
color:white;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
transition:0.3s;
}

nav a:hover{
color:#e63946;
}

/* HERO */
.hero{
background:#0a2540;
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
margin-bottom:10px;
}

button{
background:#e63946;
color:white;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* SECTIONS */
.section{
padding:40px 20px;
text-align:center;
}

/* CARDS */
.card{
background:white;
padding:20px;
border-radius:12px;
margin:15px auto;
max-width:600px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* RATINGS */
.stars{
color:gold;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div><strong>Hockey Project</strong></div>
<div>
<a href="index.html">Home</a>
<a href="camps.html">Camps</a>
<a href="location.html">Locations</a>
<a href="ratings.html">Ratings</a>
<a href="coach.html">Coach</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Hockey Project UK</h1>
<p>Elite Training Camps</p>

<a href="camps.html">
<button>🔥 Secure Your Spot</button>
</a>
</div>

<!-- WHAT YOU GET -->
<div class="section">
<h2>What You Get</h2>

<div class="card">
✔ Professional coaching<br>
✔ Match scenarios<br>
✔ Skill development<br>
✔ High intensity training
</div>
</div>

<!-- RATINGS PREVIEW -->
<div class="section">
<h2>What Players Say ⭐</h2>

<div id="ratings"></div>

<a href="ratings.html">
<button>View All Reviews</button>
</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
projectId:"hockey-camp-68285"
});

const db=firebase.firestore();

db.collection("ratings").limit(3).get().then(snap=>{
let html="";

snap.forEach(doc=>{
const r=doc.data();

html+=`
<div class="card">
<b>${r.name}</b><br>
<span class="stars">${"★".repeat(r.stars)}</span><br>
${r.review}
</div>
`;
});

document.getElementById("ratings").innerHTML=html;
});
</script>

</body>
</html>

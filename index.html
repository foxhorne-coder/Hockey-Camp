<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Hockey Project X</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
color:white;
background:linear-gradient(120deg,#0a0f2c,#1a0033,#2a0022);
background-size:300% 300%;
animation:bg 12s infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
position:fixed;
width:100%;
z-index:100;
}

nav a{color:white;margin:10px;text-decoration:none;}
nav a:hover{color:#5ad9ff;}

.nav-btn{
background:linear-gradient(90deg,#5ad9ff,#ff4d6d);
padding:10px 15px;
border-radius:8px;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:140px 60px;
min-height:100vh;
}

.left{max-width:600px;}

h1{font-size:40px;}

button{
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#5ad9ff,#ff4d6d);
color:white;
cursor:pointer;
}

/* DOT TRANSITION */
.transition{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}

.dot{
position:absolute;
width:8px;
height:8px;
background:#5ad9ff;
border-radius:50%;
animation:fly 0.8s forwards;
}

@keyframes fly{
from{transform:scale(0)}
to{transform:scale(1) translateY(100vh)}
}
</style>
</head>

<body>

<nav>
<div>Hockey Project X</div>

<div>
<a href="index.html">Home</a>
<a href="camps.html">Camps</a>
<a href="coach.html">Coaches</a>
<a href="location.html">Locations</a>
<a href="ratings.html">Ratings</a>
</div>

<a href="camps.html" class="nav-btn">Book</a>
</nav>

<div class="hero">

<div class="left">
<h1>We shape young players into stronger, smarter athletes.</h1>
<p>Elite hockey training designed for real performance.</p>
<button onclick="go('camps.html')">Explore Camps</button>
</div>

</div>

<div id="transition" class="transition"></div>

<script>
function go(url){
const t=document.getElementById("transition");

for(let i=0;i<80;i++){
let d=document.createElement("div");
d.className="dot";
d.style.left=Math.random()*100+"vw";
d.style.top=Math.random()*100+"vh";
t.appendChild(d);
}

setTimeout(()=>window.location=url,500);
}
</script>

</body>
</html>

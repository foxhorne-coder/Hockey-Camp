<!DOCTYPE html>
<html>
<head>
  <title>Hockey Project UK</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    /* LOADER */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0a2540;
      color: white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      z-index:9999;
    }

    /* NAV */
    nav {
      background:#0a2540;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav a {
      color:white;
      margin:10px;
      text-decoration:none;
    }

    /* HERO */
    .hero {
      background:url('photo1.jpg') center/cover;
      padding:120px 20px;
      text-align:center;
      color:white;
      position:relative;
    }

    .hero::before {
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,0.5);
    }

    .hero * {
      position:relative;
    }

    button {
      background:#e63946;
      color:white;
      padding:15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    /* SECTION */
    .section {
      padding:40px;
      text-align:center;
    }

    /* GALLERY */
    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:15px;
    }

    .grid img {
      width:100%;
      border-radius:10px;
    }

    /* CONTACT */
    .contact {
      padding:30px;
      background:white;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Hockey Project UK</div>

<!-- MAIN CONTENT -->
<div id="main-content" style="display:none;">

<nav>
  <img src="logo.png" style="height:40px;">
  <div>
    <a href="index.html">Home</a>
    <a href="camps.html">Camps</a>
    <a href="location.html">How to Get There</a>
    <a href="ratings.html">Ratings</a>
  </div>
</nav>

<div class="hero">
  <h1>Hockey Project UK</h1>
  <p>Elite Training Camps</p>

  <a href="camps.html">
    <button>View Camps</button>
  </a>
</div>

<div class="section">
  <h2>Train Like a Pro</h2>
  <p>Join our elite hockey camps and improve your game.</p>
</div>

<div class="section">
  <h2>Camp Action</h2>

  <div class="grid">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>
</div>

<!-- ✅ RESTORED BOTTOM SECTION -->
<div class="contact">
  <h3>Contact Us</h3>

  <p>
    EMAIL: <strong>HOCKEYPROJECTUK@GMAIL.COM</strong><br>
    INSTAGRAM: <strong>@HOCKEYPROJECTUK</strong>
  </p>
</div>

</div>

<!-- FIX LOADER -->
<script>
window.onload = function(){
  document.getElementById("loader").style.display = "none";
  document.getElementById("main-content").style.display = "block";
};
</script>

</body>
</html>

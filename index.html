<!DOCTYPE html>
<html>
<head>
  <title>Hockey Project UK</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    nav {
      background:#0a2540;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav a {
      color:white;
      margin:10px;
      text-decoration:none;
      transition: 0.3s;
    }

    nav a:hover {
      color:#e63946;
    }

    .hero {
      background:url('photo1.jpg') center/cover;
      padding:120px 20px;
      text-align:center;
      color:white;
      position:relative;
    }

    /* DARK OVERLAY (fixes white text issue) */
    .hero::before {
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,0.5);
    }

    .hero * {
      position:relative;
    }

    .hero h1 {
      font-size:42px;
    }

    button {
      background:#e63946;
      color:white;
      padding:15px 25px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background:#c92d3a;
    }

    .section {
      padding:40px;
      text-align:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:15px;
    }

    .grid img {
      width:100%;
      border-radius:10px;
      transition:0.3s;
    }

    .grid img:hover {
      transform: scale(1.05);
    }

    .contact {
      padding:30px;
      background:white;
    }
  </style>
</head>

<body>

<nav>
  <img src="logo.png" style="height:40px;">
  <div>
    <a href="index.html">Home</a>
    <a href="camps.html">Camps</a>
    <a href="location.html">How to Get There</a>
		<a href="ratings.html">Ratings</a>
  </div>
</nav>

<div class="hero">
  <h1>Hockey Project UK</h1>
  <p>Elite Training Camps</p>

  <a href="camps.html">
    <button>View Camps</button>
  </a>
</div>

<div class="section">
  <h2>Camp Action</h2>

  <div class="grid">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>
</div>

<div class="contact">
  <h3>Contact Us</h3>

  <p>
    EMAIL: <strong>HOCKEYPROJECTUK@GMAIL.COM</strong><br>
    INSTAGRAM: <strong>@HOCKEYPROJECTUK</strong>
  </p>
</div>

</body>
</html>

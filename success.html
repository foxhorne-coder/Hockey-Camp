<!DOCTYPE html>
<html>
<head>
  <title>Payment Success</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #f5f7fa;
    }
  </style>
</head>
<body>

<h2>Payment Successful 🎉</h2>
<p>Confirming your booking...</p>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const bookingId = params.get("bookingId");

if (bookingId) {
  db.collection("bookings").doc(bookingId).update({
    status: "paid"
  })
  .then(() => {
    document.body.innerHTML = "<h2>Booking Confirmed ✅</h2><p>See you at camp!</p>";
  });
}
</script>

</body>
</html>

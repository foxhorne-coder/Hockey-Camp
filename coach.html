<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Coaches</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(120deg,#0a0f2c,#1a0033);
color:white;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}
</style>
</head>

<body>

<h2>Our Coaches</h2>

<div class="grid" id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script>
firebase.initializeApp({
apiKey:"AIzaSy...",
projectId:"hockey-camp-68285"
});

firebase.firestore().collection("coaches").get().then(snap=>{
let html="";

snap.forEach(doc=>{
let c=doc.data();

html+=`
<div class="card">
<h3>${c.name}</h3>
<p>${c.role}</p>
<p>${c.desc}</p>
</div>`;
});

list.innerHTML=html;
});
</script>

</body>
</html>

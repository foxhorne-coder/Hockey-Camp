<!DOCTYPE html>
<html>
<head>
  <title>Camps</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0a2540;
      color: white;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      animation: fadeOut 1s ease 1.5s forwards;
    }

    @keyframes fadeOut {
      to {opacity:0; visibility:hidden;}
    }

    nav {
      background:#0a2540;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    nav a {
      color:white;
      margin:10px;
      text-decoration:none;
    }

    header {
      background:#0a2540;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container {
      padding:20px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-8px);
    }

    button {
      background:#e63946;
      color:white;
      padding:10px;
      border:none;
      border-radius:8px;
      width:100%;
    }
  </style>
</head>

<body>

<div id="loader">Loading...</div>

<nav>
  <img src="logo.png" style="height:40px;">
  <div>
    <a href="index.html">Home</a>
    <a href="camps.html">Camps</a>
    <a href="location.html">How to Get There</a>
    <a href="ratings.html">Ratings</a>
  </div>
</nav>

<header>
  <h1>Available Camps</h1>
</header>

<div class="container" id="camp-list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
const campList = document.getElementById("camp-list");

// COUNTDOWN FUNCTION
function getCountdown(dateStr){
  const now = new Date();
  const target = new Date(dateStr);
  const diff = target - now;

  if(diff <= 0) return "Started";

  const days = Math.floor(diff / (1000*60*60*24));
  return days + " days to go";
}

// LOAD CAMPS
db.collection("camps").onSnapshot(async snapshot => {
  campList.innerHTML = "";

  for (const doc of snapshot.docs) {
    const camp = doc.data();

    const bookingsSnap = await db.collection("bookings")
      .where("campId", "==", doc.id)
      .get();

    const spotsLeft = (camp.maxPlayers || 20) - bookingsSnap.size;

    campList.innerHTML += `
      <div class="card">
        <h3>${camp.title}</h3>

        <p>${camp.description || ""}</p>

        <p><strong>${getCountdown(camp.startDate)}</strong></p>

        <p>${camp.startDate} → ${camp.endDate}</p>
        <p>${camp.startTime} → ${camp.endTime}</p>

        <p><strong>Spots left:</strong> ${spotsLeft}</p>

        <a href="register.html?id=${doc.id}">
          <button ${spotsLeft <= 0 ? "disabled" : ""}>
            ${spotsLeft <= 0 ? "FULL" : "Book Now"}
          </button>
        </a>
      </div>
    `;
  }
});
</script>

</body>
</html>

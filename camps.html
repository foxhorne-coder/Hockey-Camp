<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camps</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
color:white;
background:linear-gradient(120deg,#0a0f2c,#1a0033,#2a0022);
background-size:300% 300%;
animation:bg 12s infinite;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}
nav a:hover{color:#5ad9ff;}

.nav-btn{
background:linear-gradient(90deg,#5ad9ff,#ff4d6d);
padding:10px 15px;
border-radius:8px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:40px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(90,217,255,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 30px rgba(90,217,255,0.6);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#5ad9ff,#ff4d6d);
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<div>Hockey Project X</div>
<div>
<a href="index.html">Home</a>
<a href="camps.html">Camps</a>
<a href="coach.html">Coaches</a>
<a href="location.html">Locations</a>
<a href="ratings.html">Ratings</a>
</div>
<a href="camps.html" class="nav-btn">Book</a>
</nav>

<div class="container" id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSy...",
projectId:"hockey-camp-68285"
});
const db=firebase.firestore();

db.collection("camps").get().then(snap=>{
let html="";

snap.forEach(doc=>{
const c=doc.data();

html+=`
<div class="card">
<h3>${c.title}</h3>
<p>${c.description||""}</p>
<p>${c.startDate||""}</p>

<a href="register.html?id=${doc.id}">
<button>Book Now</button>
</a>
</div>
`;
});

document.getElementById("list").innerHTML=html;
});
</script>

</body>
</html>

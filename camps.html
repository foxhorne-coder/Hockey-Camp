<!DOCTYPE html>
<html>
<head>
  <title>Camp Dates</title>
</head>
<body>

<h2>Camp Dates</h2>

<div id="camp-list"></div>

<a href="index.html"><button>Back Home</button></a>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const campList = document.getElementById("camp-list");

// FORMAT DATE
function formatDate(dateStr){
  const date = new Date(dateStr);
  const day = date.getDate();
  const month = date.toLocaleString('default', { month: 'long' });
  const year = date.getFullYear().toString().slice(-2);

  function getSuffix(d){
    if (d > 3 && d < 21) return "th";
    switch (d % 10){
      case 1: return "st";
      case 2: return "nd";
      case 3: return "rd";
      default: return "th";
    }
  }

  return `${day}${getSuffix(day)} of ${month} ${year}`;
}

// FORMAT TIME
function formatTime(time){
  const [hour, minute] = time.split(":");
  let h = parseInt(hour);
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${minute} ${ampm}`;
}

// LOAD CAMPS
db.collection("camps").onSnapshot(snapshot => {
  campList.innerHTML = "";

  snapshot.forEach(doc => {
    const camp = doc.data();

    campList.innerHTML += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <h3>${camp.title}</h3>

        <p>
          Dates: ${formatDate(camp.startDate)} → ${formatDate(camp.endDate)}
        </p>

        <p>
          Time: ${formatTime(camp.startTime)} → ${formatTime(camp.endTime)}
        </p>

        <p>Price: £${camp.price}</p>

        <a href="register.html?id=${doc.id}">
          <button>Book Now</button>
        </a>
      </div>
    `;
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camps</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
opacity:0;
transform:translateY(30px);
}

.card.show{opacity:1;transform:translateY(0);}
.card:hover{transform:translateY(-5px);}

button{
width:100%;
padding:12px;
background:#e63946;
color:white;
border:none;
border-radius:8px;
transition:0.3s;
}

button:hover{transform:scale(1.05);}
.urgent{color:red;font-weight:bold;}
</style>
</head>

<body>

<h2 style="text-align:center;">Available Camps</h2>

<div id="list" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

function countdown(d){
const diff=new Date(d)-new Date();
return diff<=0?"Started":Math.floor(diff/86400000)+" days";
}

db.collection("camps").onSnapshot(async snap=>{
const list=document.getElementById("list");
list.innerHTML="";

for(const doc of snap.docs){
const c=doc.data();

const b=await db.collection("bookings")
.where("campId","==",doc.id).get();

const left=(c.maxPlayers||20)-b.size;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${c.title}</h3>
<p>${c.description||""}</p>
<p>${countdown(c.startDate)}</p>
${left<=3&&left>0?`<p class="urgent">Only ${left} spots left</p>`:""}
<a href="register.html?id=${doc.id}">
<button ${left<=0?"disabled":""}>
${left<=0?"FULL":"Secure Spot"}
</button>
</a>
`;

list.appendChild(div);
setTimeout(()=>div.classList.add("show"),50);
}
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Camps</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
color:white;
background:linear-gradient(120deg,#020617,#1a0033);
}

/* FADE */
body.fade-out{opacity:0;transition:0.4s;}

/* MENU */
.menu{
position:fixed;
top:20px;
left:20px;
cursor:pointer;
z-index:200;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:rgba(0,0,0,0.95);
padding:20px;
transition:0.3s;
}

.sidebar a{
display:block;
margin:15px 0;
color:white;
text-decoration:none;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:80px 20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #5ad9ff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#5ad9ff,#ff4d6d);
}
</style>
</head>

<body>

<div class="menu" onclick="openMenu()">☰</div>

<div id="sidebar" class="sidebar">
<a onclick="go('index.html')">Home</a>
<a onclick="go('camps.html')">Camps</a>
<a onclick="go('coach.html')">Coaches</a>
<a onclick="go('location.html')">Locations</a>
<a onclick="go('ratings.html')">Ratings</a>
<a onclick="go('admin.html')">Admin</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<div id="list" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

/* MENU */
function openMenu(){
sidebar.style.left="0";
overlay.style.display="block";
}
function closeMenu(){
sidebar.style.left="-260px";
overlay.style.display="none";
}

/* TRANSITION */
function go(url){
document.body.classList.add("fade-out");
setTimeout(()=>window.location=url,400);
}

/* LOAD CAMPS */
db.collection("camps").get().then(snap=>{
let html="";
snap.forEach(doc=>{
let c=doc.data();

html+=`
<div class="card">
<h3>${c.title}</h3>
<p>${c.description}</p>
<p>${c.startDate}</p>

<a href="register.html?id=${doc.id}">
<button>Book Now</button>
</a>
</div>`;
});

list.innerHTML=html;
});
</script>

</body>
</html>

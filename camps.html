<!DOCTYPE html>
<html>
<head>
  <title>Camps</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #0a2540;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background: #e63946;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  <h1>Available Camps</h1>
</header>

<div class="container" id="camp-list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const campList = document.getElementById("camp-list");

db.collection("camps").onSnapshot(snapshot => {
  campList.innerHTML = "";

  snapshot.forEach(doc => {
    const camp = doc.data();

    campList.innerHTML += `
      <div class="card">
        <h3>${camp.title}</h3>
        <p>${camp.startDate} → ${camp.endDate}</p>
        <p>${camp.startTime} → ${camp.endTime}</p>
        <p>£${camp.price}</p>

        <a href="register.html?id=${doc.id}">
          <button>Book Now</button>
        </a>
      </div>
    `;
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Camps</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background:#0a2540;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container {
      padding:20px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    button {
      background:#e63946;
      color:white;
      padding:10px;
      border:none;
      border-radius:8px;
      width:100%;
      transition:0.3s;
    }

    button:hover {
      background:#c92d3a;
    }

    .desc {
      color:#555;
      margin:10px 0;
    }
  </style>
</head>

<body>

<header>
  <h1>Available Camps</h1>
</header>

<div class="container" id="camp-list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const campList = document.getElementById("camp-list");

db.collection("camps").onSnapshot(async snapshot => {
  campList.innerHTML = "";

  for (const doc of snapshot.docs) {
    const camp = doc.data();

    const bookingsSnap = await db.collection("bookings")
      .where("campId", "==", doc.id)
      .get();

    const spotsLeft = (camp.maxPlayers || 20) - bookingsSnap.size;

    campList.innerHTML += `
      <div class="card">
        <h3>${camp.title}</h3>

        <p class="desc">
          ${camp.description || "High intensity training, skills development and game situations."}
        </p>

        <p>${camp.startDate} → ${camp.endDate}</p>
        <p>${camp.startTime} → ${camp.endTime}</p>

        <p><strong>Spots left:</strong> ${spotsLeft}</p>

        <a href="register.html?id=${doc.id}">
          <button ${spotsLeft <= 0 ? "disabled" : ""}>
            ${spotsLeft <= 0 ? "FULL" : "Book Now"}
          </button>
        </a>
      </div>
    `;
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body style="font-family:Arial;background:#f5f7fa;">

<h2 style="text-align:center;">Camps</h2>

<input id="search" placeholder="Search camps..." oninput="load()">

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

function countdown(d){
const diff=new Date(d)-new Date();
return diff<=0?"Started":Math.floor(diff/86400000)+" days";
}

async function load(){
const search=document.getElementById("search").value.toLowerCase();
let html="";

const camps=await db.collection("camps").get();

for(const doc of camps.docs){
const c=doc.data();

if(!c.title.toLowerCase().includes(search)) continue;

const bookings=await db.collection("bookings")
.where("campId","==",doc.id).get();

const left=(c.maxPlayers||20)-bookings.size;

html+=`
<div style="background:white;margin:10px;padding:20px;border-radius:10px;">
<h3>${c.title}</h3>

<p>${c.description||""}</p>

<p>${countdown(c.startDate)}</p>

${left<=3?`<p style="color:red;">Only ${left} left!</p>`:""}

<a href="register.html?id=${doc.id}">
<button ${left<=0?"disabled":""}>${left<=0?"FULL":"Book"}</button>
</a>
</div>
`;
}

document.getElementById("list").innerHTML=html;
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camps</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}

nav{background:#0a2540;padding:15px;color:white;}
nav a{color:white;margin:10px;text-decoration:none;}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
transition:0.3s;
}
.card:hover{transform:translateY(-5px);}

.urgent{color:red;font-weight:bold;}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="camps.html">Camps</a>
</nav>

<h2 style="text-align:center;">Available Camps</h2>

<div class="container" id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
authDomain:"hockey-camp-68285.firebaseapp.com",
projectId:"hockey-camp-68285"
});

const db=firebase.firestore();

function countdown(d){
const diff=new Date(d)-new Date();
return diff<=0?"Started":Math.floor(diff/86400000)+" days";
}

db.collection("camps").onSnapshot(async snap=>{
let html="";
for(const doc of snap.docs){
const c=doc.data();

const b=await db.collection("bookings")
.where("campId","==",doc.id).get();

const left=(c.maxPlayers||20)-b.size;

html+=`
<div class="card">
<h3>${c.title}</h3>
<p>${c.description||""}</p>

<p>${countdown(c.startDate)}</p>

${left<=3 && left>0?`<p class="urgent">🔥 Only ${left} spots left!</p>`:""}

<p>Spots: ${left}</p>

<a href="register.html?id=${doc.id}">
<button ${left<=0?"disabled":""}>
${left<=0?"FULL":"🔥 Secure Spot"}
</button>
</a>
</div>
`;
}
document.getElementById("list").innerHTML=html;
});
</script>

</body>
</html>

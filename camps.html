<!DOCTYPE html>
<html>

<body>

<h2>Camp Dates</h2>

<div id="camp-list"></div>

<a href="index.html">
  <button>Back Home</button>
</a>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285",
  storageBucket: "hockey-camp-68285.firebasestorage.app",
  messagingSenderId: "311365605934",
  appId: "1:311365605934:web:133aa5172e95908e541dbf",
  measurementId: "G-77GDJX4N0P"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const campList = document.getElementById("camp-list");

// 🔥 THIS LISTENS LIVE
db.collection("camps").onSnapshot(snapshot => {
  campList.innerHTML = "";

  snapshot.forEach(doc => {
    const camp = doc.data();

    campList.innerHTML += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <h3>${camp.title}</h3>
        <p>Date: ${camp.date}</p>
        <p>Price: £${camp.price}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>

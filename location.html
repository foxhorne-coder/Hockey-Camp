<!DOCTYPE html>
<html>
<head>
  <title>Locations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {font-family:Arial; background:#f5f7fa; margin:0; text-align:center;}

    nav {background:#0a2540; padding:15px; color:white;}

    .warning {
      background:#e63946;
      color:white;
      padding:15px;
      font-weight:bold;
    }

    .box {
      background:white;
      margin:20px;
      padding:20px;
      border-radius:12px;
    }

    iframe {
      width:100%;
      height:300px;
      border-radius:10px;
    }

    button {
      background:#e63946;
      color:white;
      padding:10px;
      border:none;
      border-radius:8px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<nav>
  <h2>Locations</h2>
</nav>

<div class="warning">
  ⚠️ Make sure you check which venue your camp is at before arriving
</div>

<div class="box">
  <h3>Blatchington Mill School</h3>
  <iframe src="https://www.google.com/maps?q=Blatchington+Mill+School&output=embed"></iframe>
</div>

<div class="box">
  <h3>Bede’s School</h3>
  <iframe src="https://www.google.com/maps?q=Bedes+School&output=embed"></iframe>
</div>

</body>
</html>

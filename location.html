<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Locations</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(120deg,#0a0f2c,#1a0033);
color:white;
padding:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
margin:15px 0;
cursor:pointer;
}

.map{
display:none;
margin-top:15px;
}

.card.active .map{
display:block;
}
</style>
</head>

<body>

<h2>Locations</h2>

<div class="card" onclick="toggle(this)">
<h3>Blatchington Mill School</h3>

<div class="map">
<iframe
width="100%"
height="250"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Blatchington+Mill+School&output=embed">
</iframe>
</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Bede’s School</h3>

<div class="map">
<iframe
width="100%"
height="250"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Bedes+School&output=embed">
</iframe>
</div>
</div>

<script>
function toggle(el){
el.classList.toggle("active");
}
</script>

</body>
</html>

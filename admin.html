<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      background: #e63946;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #c92d3a;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Admin Panel</h1>

  <a href="dashboard.html">
    <button>Add Camps</button>
  </a>

  <a href="bookings.html">
    <button>View Bookings</button>
  </a>

  <a href="index.html">
    <button>Back to Website</button>
  </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body>

  <h2>Admin Login</h2>

  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
      authDomain: "hockey-camp-68285.firebaseapp.com",
      projectId: "hockey-camp-68285",
      storageBucket: "hockey-camp-68285.firebasestorage.app",
      messagingSenderId: "311365605934",
      appId: "1:311365605934:web:133aa5172e95908e541dbf",
      measurementId: "G-77GDJX4N0P"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location = "dashboard.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Admin</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(120deg,#0a0f2c,#1a0033);
color:white;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:20px 0;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
background:#ff4d6d;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>

<div class="card">
<h3>Ratings Manager</h3>
<div id="ratings"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});
const db=firebase.firestore();

function load(){
db.collection("ratings").get().then(snap=>{
let html="";
snap.forEach(doc=>{
let r=doc.data();
html+=`
<div>
${r.name} - ${r.review}
<button onclick="del('${doc.id}')">Delete</button>
</div>`;
});
ratings.innerHTML=html;
});
}

function del(id){
db.collection("ratings").doc(id).delete();
load();
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body style="text-align:center;font-family:Arial;padding:40px;">

<h2>Leave Review</h2>

<input id="name"><br><br>
<input id="team"><br><br>
<select id="stars">
<option value="5">5</option>
<option value="4">4</option>
</select><br><br>

<textarea id="review"></textarea><br><br>

<button onclick="send()">Submit</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

function send(){
firebase.firestore().collection("ratings").add({
name:name.value,
team:team.value,
stars:Number(stars.value),
review:review.value
});
}
</script>

</body>
</html>

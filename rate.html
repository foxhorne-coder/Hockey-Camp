<!DOCTYPE html>
<html>
<body style="font-family:Arial;background:#020617;color:white;text-align:center;padding:40px;">

<h2>Leave Review</h2>

<input id="name"><br>
<input id="team"><br>
<select id="stars">
<option value="5">★★★★★</option>
<option value="4">★★★★</option>
</select><br>

<textarea id="review"></textarea><br>

<button onclick="send()">Submit</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSy...",projectId:"hockey-camp-68285"});

function send(){
firebase.firestore().collection("ratings").add({
name:name.value,
team:team.value,
stars:Number(stars.value),
review:review.value
});
}
</script>

</body>
</html>

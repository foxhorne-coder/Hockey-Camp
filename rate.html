<!DOCTYPE html>
<html>
<head>
  <title>Leave a Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #e63946;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Leave a Review ⭐</h2>

  <input id="name" placeholder="Your Name">
  <input id="team" placeholder="Your Team">

  <select id="stars">
    <option value="5">★★★★★ (5)</option>
    <option value="4">★★★★ (4)</option>
    <option value="3">★★★ (3)</option>
    <option value="2">★★ (2)</option>
    <option value="1">★ (1)</option>
  </select>

  <textarea id="review" placeholder="Write your review"></textarea>

  <button onclick="submitReview()">Submit Review</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC54F2hAyF3JFmk4Nr-dK1EDgEEgu-ya14",
  authDomain: "hockey-camp-68285.firebaseapp.com",
  projectId: "hockey-camp-68285"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function submitReview(){
  const name = document.getElementById("name").value;
  const team = document.getElementById("team").value;
  const stars = parseInt(document.getElementById("stars").value);
  const review = document.getElementById("review").value;

  if(!name || !team || !review){
    alert("Fill all fields");
    return;
  }

  db.collection("ratings").add({
    name,
    team,
    stars,
    review
  })
  .then(()=>{
    alert("Review submitted!");
    window.location = "ratings.html";
  })
  .catch(err => alert(err));
}
</script>

</body>
</html>
